<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daftar - VideoBelajar</title>
  <link rel="stylesheet" href="./css/register.css">
</head>
<body>
  <header class="header">
    <a href="./index.html" aria-label="VideoBelajar Beranda">
      <img src="./assets/logo_videobelajar.png" alt="VideoBelajar" class="header__logo">
    </a>
  </header>

  <main class="auth-page">
    <section class="auth-card" aria-labelledby="register-title">
      <div class="auth-card__heading">
        <h1 id="register-title">Pendaftaran Akun</h1>
        <p>Yuk, daftarkan akunmu sekarang juga!</p>
      </div>

      <form class="auth-form">
        <div class="form-field">
          <label for="fullname">Nama Lengkap <span>*</span></label>
          <input type="text" id="fullname" name="fullname">
        </div>

        <div class="form-field">
          <label for="email">E-Mail <span>*</span></label>
          <input type="email" id="email" name="email">
        </div>

        <div class="form-field">
          <label for="phone">No. Hp <span>*</span></label>
          <div class="phone-field">
            <div class="phone-field__code">
              <div class="phone-field__flag">
                <img src="./assets/id.svg" alt="Indonesia" id="country-flag">
              </div>
              <select id="country-code" name="country-code" aria-label="Kode negara">
                <option value="+62">+62</option>
                <option value="+65">+65</option>
                <option value="+66">+66</option>
              </select>
            </div>
            <input type="tel" id="phone" name="phone">
          </div>
        </div>

        <div class="form-field">
          <label for="password">Kata Sandi <span>*</span></label>
          <div class="password-field">
            <input type="password" id="password" name="password">
            <button type="button" aria-label="Tampilkan kata sandi">
              <img src="./assets/mdi_eye-off.svg" alt="">
            </button>
          </div>
        </div>

        <div class="form-field">
          <label for="confirm-password">Konfirmasi Kata Sandi <span>*</span></label>
          <div class="password-field">
            <input type="password" id="confirm-password" name="confirm-password">
            <button type="button" aria-label="Tampilkan konfirmasi kata sandi">
              <img src="./assets/mdi_eye-off.svg" alt="">
            </button>
          </div>
        </div>

        <div class="auth-card__helper">
          <a href="./login.html">Lupa Password?</a>
        </div>

        <button class="auth-button auth-button--primary" type="button">Daftar</button>
        <a class="auth-button auth-button--secondary" href="./login.html">Masuk</a>

        <div class="auth-divider">
          <span></span>
          <p>atau</p>
          <span></span>
        </div>

        <button class="auth-button auth-button--google" type="button">
          <img src="./assets/logos_google-icon.svg" alt="">
          <span>Daftar dengan Google</span>
        </button>
      </form>
    </section>
  </main>

  <script>
    const countryCode = document.getElementById('country-code')
    const countryFlag = document.getElementById('country-flag')
    const countryFlags = {
      '+62': {
        src: './assets/id.svg',
        alt: 'Indonesia'
      },
      '+65': {
        src: './assets/sg.svg',
        alt: 'Singapore'
      },
      '+66': {
        src: './assets/th.svg',
        alt: 'Thailand'
      }
    }

    countryCode.addEventListener('change', function () {
      const selectedCountry = countryFlags[this.value]

      countryFlag.src = selectedCountry.src
      countryFlag.alt = selectedCountry.alt
    })
  </script>
</body>
</html>
