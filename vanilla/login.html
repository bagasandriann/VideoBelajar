<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Masuk - VideoBelajar</title>
  <link rel="stylesheet" href="./css/login.css">
</head>
<body>
  <header class="header header--simple">
    <a href="./index.html" aria-label="VideoBelajar Beranda">
      <img src="./assets/logo_videobelajar.png" alt="VideoBelajar" class="header__logo">
    </a>
  </header>

  <main class="auth-page">
    <section class="auth-card" aria-labelledby="login-title">
      <div class="auth-card__heading">
        <h1 id="login-title">Masuk ke Akun</h1>
        <p>Yuk, lanjutin belajarmu di videobelajar.</p>
      </div>

      <form class="auth-form">
        <div class="form-field">
          <label for="email">E-Mail <span>*</span></label>
          <input type="email" id="email" name="email">
        </div>

        <div class="form-field">
          <label for="password">Kata Sandi <span>*</span></label>
          <div class="password-field">
            <input type="password" id="password" name="password">
            <button type="button" aria-label="Tampilkan kata sandi">
              <img src="./assets/mdi_eye-off.svg" alt="">
            </button>
          </div>
        </div>

        <div class="auth-card__helper">
          <a href="./register.html">Lupa Password?</a>
        </div>

        <button class="auth-button auth-button--primary" type="button">Masuk</button>
        <a class="auth-button auth-button--secondary" href="./register.html">Daftar</a>

        <div class="auth-divider">
          <span></span>
          <p>atau</p>
          <span></span>
        </div>

        <button class="auth-button auth-button--google" type="button">
          <img src="./assets/logos_google-icon.svg" alt="">
          <span>Masuk dengan Google</span>
        </button>
      </form>
    </section>
  </main>
</body>
</html>
